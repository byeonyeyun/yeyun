services:
  # 1. Redis (메시지 브로커 및 캐싱)
  redis:
    image: redis:alpine
    container_name: redis
    mem_limit: 256M
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 2. Database
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    mem_limit: 768M
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    networks:
      - backend
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --port=${DB_PORT}
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. API Server (FastAPI)
  fastapi:
    container_name: fastapi
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}
    env_file: .env
    mem_limit: 512M
    volumes:
      - static_volume:/app/templates
      - media_volume:/app/app/media
    restart: always
    ports:
      - "8000:8000"
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started

  # 4. AI Worker (Model 학습 및 추론)
  ai-worker:
    container_name: ai-worker
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}
    env_file: .env
    restart: always
    mem_limit: 1G
    volumes:
      - media_volume:/app/app/media
    networks:
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 5. Nginx (웹 서버 - 리버스 프록시)
  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    mem_limit: 128M
    volumes:
      - ./nginx/prod_https.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/vol/web/static
      - ./frontend/dist:/usr/share/nginx/html:ro
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
    depends_on:
      - fastapi

  # 7. Certbot (SSL 인증서 자동 갱신)
  certbot:
    image: certbot/certbot
    container_name: auto-certbot
    mem_limit: 64M
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 48h & wait $${!}; done;'"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - nginx

  # 6. ChromaDB (벡터 DB)
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: chromadb
    restart: always
    mem_limit: 512M
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - backend

volumes:
  mysql_data:
    name: mysql_data
  static_volume:
    name: static_volume
  media_volume:
    name: media_volume
  chroma_data:
    name: chroma_data
  certbot-conf:
    name: certbot-conf
  certbot-www:
    name: certbot-www

networks:
  frontend:
    name: frontend
    driver: bridge
  backend:
    name: backend
    driver: bridge
