services:
  # 1. Redis (메시지 브로커 및 캐싱)
  redis:
    image: redis:alpine
    container_name: redis
    mem_limit: 512M
    networks:
      - backend
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 2. Database
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    mem_limit: 2G
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: 'Asia/Seoul'
    ports:
      - ${DB_EXPOSE_PORT}:${DB_PORT}
    networks:
      - backend
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --port=${DB_PORT}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. API Server (FastAPI)
  fastapi:
    container_name: fastapi
    build:
      context: .
      dockerfile: app/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}
    env_file: .env
    mem_limit: 1G
    command: |
      sh -c "uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/app/app
      - static_volume:/app/templates
      - media_volume:/app/app/media
    restart: always
    ports:
      - "8000:8000"
    networks:
      - frontend
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started

  # 4. AI Worker (Model 학습 및 추론)
  ai-worker:
    container_name: ai-worker
    build:
      context: .
      dockerfile: ai_worker/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}
    env_file: .env
    restart: always
    mem_limit: 4G
    volumes:
      - media_volume:/app/app/media
    networks:
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 5. ChromaDB (벡터 DB - RAG 파이프라인)
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: chromadb
    mem_limit: 1G
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 6. Nginx (웹 서버 - 요청 리버스 프록시로 전달)
  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    mem_limit: 256M
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/vol/web/static
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    networks:
      - frontend
    depends_on:
      - fastapi

volumes:
  mysql_data:
  static_volume:
  media_volume:
  chroma_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
