upstream fastapi {
    server fastapi:8000;
}

# REQ-113~116: Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_ocr:10m rate=3r/s;

# http → https 리다이렉트
server {
    listen 80;
    server_name logly.life;

    # certbot ssl 인증서 갱신
    location /.well-known/acme-challenge/ {
       root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# https
server {
    server_name logly.life;

    listen 443 ssl;

    ssl_certificate /etc/letsencrypt/live/logly.life/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logly.life/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # 인증 API (로그인/회원가입) - 엄격한 rate limit
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_buffering off;
    }

    # OCR 업로드 - rate limit
    location /api/v1/ocr/ {
        limit_req zone=api_ocr burst=5 nodelay;
        limit_req_status 429;

        client_max_body_size 10m;

        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_buffering off;
    }

    # 일반 API
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_buffering off;
    }

    # 정적 자산 캐싱 (Vite hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # 프론트엔드 정적 파일
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
